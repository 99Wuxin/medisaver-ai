name = "99"
main = "server/src/index.js"
compatibility_date = "2026-03-23"

# Production: https://statutebill.com (and www) via [[routes]] below.
# workers.dev mirror still available when workers_dev = true.
workers_dev = true

[[routes]]
pattern = "statutebill.com/*"
zone_name = "statutebill.com"

[[routes]]
pattern = "www.statutebill.com/*"
zone_name = "statutebill.com"

[assets]
directory = "client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Local dev: each plan must use a different Stripe Price ID (copy from each product in Dashboard).
STRIPE_PRICE_BASIC = "price_1TEMLBHv9HY3JHstELZkVneu"
STRIPE_PRICE_PROTECTOR = "price_1TEMLPHv9HY3JHstpCyVSBBy"
STRIPE_PRICE_FAMILY = "price_1TEMLZHv9HY3JHst620su2sF"
GEMINI_MODEL = "gemini-2.5-flash"

# Secret values are NOT stored in wrangler.toml.
# Configure in Cloudflare: `wrangler secret put GEMINI_API_KEY`
# For local `wrangler dev`, add to `.dev.vars` (not committed):
# GEMINI_API_KEY=your_key_here


# If you want object storage later, uncomment and configure R2.
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "medisaver-assets"

# D1 (email/password auth). Apply migrations: wrangler d1 migrations apply statutebill-users --remote
[[d1_databases]]
binding = "DB"
database_name = "statutebill-users"
database_id = "47000a96-019b-497a-a0db-f73fce97922f"
