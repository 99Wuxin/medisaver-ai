name = "99" # matches Worker name; workers.dev URL: 99.wuxinyou99.workers.dev
main = "server/src/index.js"
compatibility_date = "2026-03-23"

# Same hostnames as Cloudflare dashboard → Triggers / Custom domains:
# - workers.dev: 99.wuxinyou99.workers.dev (Preview: *-99.wuxinyou99.workers.dev is automatic)
# - Custom: statutebill.com
# - Custom: use www.statutebill.com (if dashboard shows wwww.statutebill.com, fix the typo there)
workers_dev = true

[[routes]]
pattern = "statutebill.com/*"
zone_name = "statutebill.com"

[[routes]]
pattern = "www.statutebill.com/*"
zone_name = "statutebill.com"

[assets]
directory = "client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Local dev: each plan must use a different Stripe Price ID (copy from each product in Dashboard).
STRIPE_PRICE_BASIC = "price_1TEMLBHv9HY3JHstELZkVneu"
STRIPE_PRICE_PROTECTOR = "price_1TEMLPHv9HY3JHstpCyVSBBy"
STRIPE_PRICE_FAMILY = "price_1TEMLZHv9HY3JHst620su2sF"


# If you want object storage later, uncomment and configure R2.
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "medisaver-assets"
